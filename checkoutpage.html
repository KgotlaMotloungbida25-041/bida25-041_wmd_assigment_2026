 <div class="container py-5 min-vh-100 d-flex align-items-center">

    <div class="row w-100 align-items-center">

        <!-- Logo Section -->
        <div class="col-12 col-md-4 text-center mb-4 mb-md-0">

            <img src="images/gadget-zone-logo.png" class="img-fluid w-50">

            <h2 class="mt-3">The GadgetZone</h2>

        </div>

        <!-- Checkout Section -->
        <div class="col-12 col-md-8  ">

            <div class="card shadow-lg border-0 rounded-4 p-4">

                <h3 class="mb-4 text-center text-md-start">
                    Checkout
                </h3>

                <form onsubmit="showMessage(event)">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Delivery Address</label>
                        <textarea class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-outline-primary w-100">
                        Submit Order
                    </button>

                </form>

            </div>

        </div>

    </div>
