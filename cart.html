<!DOCTYPE html>
<html>
    <head>
        <title>GadgetZone</title>
         <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" initial-scale="1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
<div class="container py-5 min-vh-100 d-flex align-items-center">

    <div class="row w-100 align-items-center">

        <!-- Logo Section -->
        <div class="col-12 col-md-4 text-center mb-4 mb-md-0">

            <img src="images/gadget-zone-logo.png" class="img-fluid w-50">

            

        </div>

        <!-- Cart Section -->
        <div class="col-12 col-md-8">

            <div class="card shadow-lg border-0 rounded-4 p-4">

                <h3 class="mb-4 text-center text-md-start">
                    Add To Cart
                </h3>

                <form onsubmit="addCart(event)">

                    <div class="mb-3">

                        <label class="form-label">
                            Product Name
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter product name"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Quantity
                        </label>

                        <input type="number"
                               class="form-control"
                               placeholder="Enter quantity"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Select Size
                        </label>

                        <select class="form-select">

                            <option>Small</option>
                            <option>Medium</option>
                            <option>Large</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Select Color
                        </label>

                        <select class="form-select">

                            <option>Black</option>
                            <option>White</option>
                            <option>Blue</option>

                        </select>

                    </div>

                    <button type="submit"
                            class="btn btn-outline-success w-100">

                        Add To Cart

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>
